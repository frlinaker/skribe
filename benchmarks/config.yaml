# OpenML datasets use openml_name/version. CSV-backed datasets use csv_path
# (relative to the benchmarks/ directory), target_col, and description
# instead. All 16 are used by the main classifier benchmark; datasets
# is the subset consumed by the (currently smaller) adaptive feature
# engineering benchmark.
datasets:
  - name: adult
    openml_name: adult
    version: 2
  - name: credit-g
    openml_name: credit-g
    version: 1
  - name: bank-marketing
    openml_name: bank-marketing
    version: 1
  - name: mushroom
    openml_name: mushroom
    version: 1
  - name: car
    openml_name: car
    version: 3
  - name: nursery
    openml_name: nursery
    version: 3
  - name: vote
    openml_name: vote
    version: 1
  - name: tic-tac-toe
    openml_name: tic-tac-toe
    version: 1
  - name: kr-vs-kp
    openml_name: kr-vs-kp
    version: 1
  - name: monks-2
    openml_name: monks-problems-2
    version: 1
  - name: soybean
    openml_name: soybean
    version: 1
  - name: hepatitis
    openml_name: hepatitis
    version: 1
  - name: lymph
    openml_name: lymph
    version: 1
  - name: zoo
    openml_name: zoo
    version: 1
  - name: heart-statlog
    openml_name: heart-statlog
    version: 1
  - name: spotify-genre
    csv_path: ../examples/external_data/spotify_genre.csv
    target_col: genre
    description: >-
      Spotify track genre classification. Each row is a unique track.
      Target is the playlist genre: edm, latin, pop, r&b, rap, rock.
      Features include track_name and track_artist (text identifiers useful
      for world-knowledge lookup), track_popularity (0-100 Spotify score),
      and audio features: danceability (0-1, rhythmic suitability for dancing),
      energy (0-1, intensity/activity), key (musical key 0-11),
      loudness (dB, typically -60 to 0), mode (1=major, 0=minor),
      speechiness (0-1, presence of spoken words),
      acousticness (0-1, confidence track is acoustic),
      instrumentalness (0-1, predicts no vocals),
      liveness (0-1, presence of live audience),
      valence (0-1, musical positiveness), tempo (BPM),
      duration_ms (track length in milliseconds).
