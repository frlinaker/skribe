# Shared config for the skribe benchmarks. Single source of truth for
# datasets, LLM models, and baseline learners — read by benchmark_utils.py
# and, in turn, by every script that imports from it (run_openml_fit.py,
# collate.py, build_skribe_inspector.py, run_adaptive_fe_benchmark.py,
# test_large_prompt.py). run_all_models.sh and monitor.sh read it via a
# small inline-Python bridge since they're shell scripts.

# Ordered oldest -> newest. release_date is approximate; used as the x-axis
# value in progression charts. Only base (non-web) models are listed here
# — a "-web" sibling is auto-derived for every model with supports_web: true
# (model_id + "-web", label + " +web", web_search: true, base_model_id set,
# color lightened).
